{% if site.post_search %}

<div
  id="beautifuljekyll-search-overlay"
  data-search-script="https://unpkg.com/simple-jekyll-search@latest/dest/simple-jekyll-search.min.js"
  data-search-json="{{ site.baseurl }}/assets/data/searchcorpus.json">

  <div id="nav-search-exit" title="Exit search">✕</div>
  <input type="text" id="nav-search-input" placeholder="Search">
  <ul id="search-results-container"></ul>
</div>

{% endif %}
