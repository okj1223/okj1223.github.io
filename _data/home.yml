certifications:
  - name: Gas Tungsten Arc Welding Technician (TIG)
    image: /assets/img/welding_img.webp
    alt: TIG Welding Technician
    details:
      - Proficient in high-precision TIG welding of stainless steel components (<= 3 mm) for robotic structural frames and sensor mounts
      - Familiar with integrating TIG welding into robotic automation cells, including torch path planning and weld parameter optimization
      - Understands thermal distortion management in precision assemblies, critical for end-effector and actuator housing fabrication
  - name: Forklift Operator License
    image: /assets/img/forklift_img.webp
    alt: Forklift Operator License
    details:
      - Understanding of kinematics and control for wheeled mobile robots in indoor logistics environments
      - Simulation of automated forklift systems using ROS or Python for path planning and load control
      - Integration of obstacle detection sensors (e.g., ultrasonic, LiDAR) for safe autonomous navigation
  - name: Industrial Safety Engineer
    image: /assets/img/safety_img.webp
    alt: Industrial Safety Engineer
    details:
      - Perform risk assessments on automated workcells and robotic cells to identify pinch points, reach hazards, and control failures
      - Design and integrate safety-rated hardware (light curtains, safety PLCs, emergency stops) into robotic installations
      - Create training programs for operators and maintenance teams on safe robot operation, lock-out/tag-out (LOTO), and preventive maintenance
  - name: Air Environment Engineer
    image: /assets/img/air_environment_img.webp
    alt: Air Environment Engineer
    details:
      - Integration of air quality monitoring sensors into mobile or industrial robotic platforms
      - Design of environmental data acquisition systems using embedded devices (e.g., Arduino, Raspberry Pi)
      - Development of safety control logic based on pollutant concentration thresholds to enable autonomous robotic decision-making
  - name: General Mechanical Engineer
    image: /assets/img/mechanical_engineer_img.webp
    alt: General Mechanical Engineer
    details:
      - Design and analysis of robot joints and linkages using CAD and structural simulation tools
      - Application of mechanical tolerance and fit standards in precision robotic assemblies
      - Selection and integration of actuators, gears, and mechanical components based on load and motion requirements

