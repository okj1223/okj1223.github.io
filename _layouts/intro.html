<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/ecosystem.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/intro.css' | relative_url }}?v={{ site.time | date: '%s' }}" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="intro-wrapper">

    <video
      id="intro-video"
      autoplay
      muted
      playsinline
      loop
      preload="metadata"
      poster="{{ '/assets/img/robotics-lounge-banner.png' | relative_url }}"
      aria-hidden="true">
      <source data-src="{{ '/assets/videos/intro.webm' | relative_url }}" type="video/webm">
      <source data-src="{{ '/assets/videos/intro.mp4' | relative_url }}" type="video/mp4">
    </video>

    <div class="intro-overlay"></div>

    <div class="intro-content">

      <p class="intro-eyebrow">
        Environmental Robotics &nbsp;·&nbsp; Industrial Automation &nbsp;·&nbsp; Full-Stack Engineering
      </p>

      <h1><strong>Building Systems</strong><br>That Work in the Real World</h1>

      <p class="intro-descriptor">
        Hardware design, software integration, and intelligent control —<br>
        from concept to deployment.
      </p>

      <p class="intro-byline">
        <span class="intro-byline-label">Portfolio by</span>
        <span class="intro-byline-name">Kyungjun Oh</span>
      </p>

      <button id="skip-button" data-href="{{ '/home.html' | relative_url }}">
        View Portfolio &nbsp;→
      </button>

    </div>
  </div>

  <script src="{{ '/assets/js/intro.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
