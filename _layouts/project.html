---
layout: default
---

<!-- 🌿 에코 테마 CSS 강제 로드 -->
<link rel="stylesheet" href="{{ '/assets/css/ecosystem.css' | relative_url }}">

<!-- 상세 페이지 본문 시작 -->
<section class="project-hero">
  <div class="container">
    <h1 class="project-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="project-subtitle">{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="project-overview">
  <div class="container project-layout">
    <!-- 본문 영역 -->
    <main class="project-content">
      {{ content }}

      {% if page.video_url %}
      <div class="video-inline">
        <h2>Demo Video</h2>
        <div class="video-wrapper">
          <iframe
            src="{{ page.video_url }}"
            title="{{ page.title }}"
            frameborder="0"
            allowfullscreen>
          </iframe>
        </div>
      </div>
      {% endif %}
    </main>

    <!-- 자동 TOC 사이드바 -->
    <aside class="project-toc" id="toc-sidebar">
      <h4>📋 Contents</h4>
      <nav id="toc-nav">
        <!-- TOC가 여기에 자동 생성됩니다 -->
      </nav>
    </aside>
  </div>
</section>

<section class="project-back">
  <div class="container">
    <a href="{{ '/projects/' | relative_url }}" class="button view-all-button">
      &larr; Back to Projects
    </a>
  </div>
</section>

<!-- 🌿 에코 테마 배경 요소들 추가 -->
<div class="eco-leaves">
  <div class="leaf"></div>
  <div class="leaf"></div>
  <div class="leaf"></div>
  <div class="leaf"></div>
  <div class="leaf"></div>
  <div class="leaf"></div>
  <div class="leaf"></div>
  <div class="leaf"></div>
</div>

<div class="bg-grid-pattern">
  <div class="grid-lines horizontal"></div>
  <div class="grid-lines vertical"></div>
</div>

<!-- 자동 TOC 생성 JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const tocNav = document.getElementById('toc-nav');
  const content = document.querySelector('.project-content');
  
  if (!tocNav || !content) return;
  
  // h2, h3, h4 헤딩 찾기
  const headings = content.querySelectorAll('h2, h3, h4');
  
  if (headings.length === 0) {
    document.getElementById('toc-sidebar').style.display = 'none';
    return;
  }
  
  // TOC HTML 생성
  let tocHTML = '<ul class="toc-list">';
  
  headings.forEach((heading, index) => {
    // 고유 ID 생성 (없으면)
    if (!heading.id) {
      // 제목에서 특수문자 제거하고 kebab-case로 변환
      const text = heading.textContent.trim()
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '') // 특수문자 제거
        .replace(/\s+/g, '-')         // 공백을 하이픈으로
        .replace(/-+/g, '-')          // 연속 하이픈 제거
        .replace(/^-|-$/g, '');       // 앞뒤 하이픈 제거
      
      heading.id = text || 'heading-' + index;
    }
    
    // 헤딩 레벨 확인
    const level = parseInt(heading.tagName.charAt(1));
    const text = heading.textContent.trim();
    
    // 이모지 제거 (TOC에서는 깔끔하게)
    const cleanText = text.replace(/[\u{1F600}-\u{1F64F}]|[\u{1F300}-\u{1F5FF}]|[\u{1F680}-\u{1F6FF}]|[\u{1F1E0}-\u{1F1FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, '').trim();
    
    tocHTML += `<li class="toc-item toc-level-${level}">
      <a href="#${heading.id}" class="toc-link" data-target="${heading.id}">${cleanText}</a>
    </li>`;
  });
  
  tocHTML += '</ul>';
  tocNav.innerHTML = tocHTML;
  
  // 스무스 스크롤 이벤트
  const tocLinks = tocNav.querySelectorAll('.toc-link');
  tocLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('data-target');
      const target = document.getElementById(targetId);
      
      if (target) {
        const offsetTop = target.getBoundingClientRect().top + window.pageYOffset - 100;
        window.scrollTo({
          top: offsetTop,
          behavior: 'smooth'
        });
      }
    });
  });
  
  // 스크롤 시 현재 섹션 하이라이트
  function updateActiveLink() {
    let current = '';
    const scrollPos = window.pageYOffset + 150;
    
    headings.forEach(heading => {
      const offsetTop = heading.offsetTop;
      if (offsetTop <= scrollPos) {
        current = heading.id;
      }
    });
    
    // 활성 링크 업데이트
    tocLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('data-target') === current) {
        link.classList.add('active');
      }
    });
  }
  
  // 스크롤 이벤트 (throttled)
  let ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        updateActiveLink();
        ticking = false;
      });
      ticking = true;
    }
  });
  
  // 초기 활성 링크 설정
  updateActiveLink();

  // 표 → 반응형 스크롤 래퍼 자동 적용
  content.querySelectorAll('table').forEach(table => {
    if (!table.closest('.table-wrap')) {
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      table.parentNode.insertBefore(wrap, table);
      wrap.appendChild(table);
    }
  });
});
</script>

<style>

/* 기본 body 설정 */

}

/* 프로젝트 히어로 섹션 */

  background: linear-gradient(135deg, rgba(248, 252, 248, 0.7) 0%, rgba(240, 248, 240, 0.7) 50%, rgba(232, 245, 232, 0.7) 100%);
  border-bottom: 1px solid rgba(184, 212, 227, 0.2);
  position: relative;
  margin-top: 0px; /* 네비게이션 높이만큼 여백 */
}

.project-title {
  font-size: var(--text-3xl, 2.5rem) !important;
  margin-bottom: 0.5rem !important;
  color: var(--clr-navy, #2e4a56) !important;
  font-family: var(--font-display, 'Merriweather', serif) !important;
  font-weight: 300 !important;
  line-height: 1.3;
}

.project-subtitle {
  font-size: var(--text-md, 1.1rem) !important;
  color: var(--clr-steel, #5d737e) !important;
  font-family: var(--font-sans, 'Inter', sans-serif) !important;
  font-weight: 400 !important;

}

/* 📋 TOC와 프로젝트 레이아웃 스타일 */
.project-layout {

}
