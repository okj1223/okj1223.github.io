<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Humanoid warehouse manipulation learning pipeline</title>
  <desc id="desc">Conceptual system overview showing teleoperation, multimodal data capture, quality assurance, dataset curation, and imitation plus reinforcement learning support for humanoid warehouse tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbfa"/>
      <stop offset="100%" stop-color="#ebf4f2"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a8fa8"/>
      <stop offset="100%" stop-color="#6cab8c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#7ca7b7" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#6b8690"/>
    </marker>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #1f3a44; }
      .subtitle { font: 500 22px Arial, sans-serif; fill: #edf7fb; }
      .section { font: 700 24px Arial, sans-serif; fill: #244754; }
      .label { font: 700 20px Arial, sans-serif; fill: #22404b; }
      .body { font: 400 18px Arial, sans-serif; fill: #48646f; }
      .small { font: 600 16px Arial, sans-serif; fill: #58757f; }
      .chip { font: 700 15px Arial, sans-serif; fill: #3e5963; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="70" y="56" width="1460" height="116" rx="30" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="110" y="118" class="title" fill="#ffffff">Humanoid Warehouse Manipulation Learning Pipeline</text>
  <text x="110" y="150" class="subtitle">Teleoperated data collection, QA taxonomy, and hybrid learning support for Robros logistics PoCs</text>

  <rect x="90" y="220" width="320" height="255" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="268" class="section">Task Scope</text>
  <rect x="120" y="292" width="122" height="36" rx="18" fill="#d8eef7"/>
  <text x="146" y="316" class="chip">IGRIS-B</text>
  <text x="120" y="360" class="label">Soft-item packing</text>
  <text x="120" y="390" class="body">Socks, T-shirts, towels,</text>
  <text x="120" y="416" class="body">and other deformable items</text>
  <rect x="120" y="438" width="122" height="36" rx="18" fill="#dff4e7"/>
  <text x="146" y="462" class="chip">IGRIS-C</text>
  <text x="120" y="524" class="label">Box transfer</text>
  <text x="120" y="554" class="body">Rolltainer-to-conveyor</text>
  <text x="120" y="580" class="body">upper-body logistics tasks</text>

  <rect x="450" y="220" width="330" height="255" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <text x="480" y="268" class="section">Teleoperation and Sensing</text>
  <text x="480" y="330" class="label">Master-arm demonstrations</text>
  <text x="480" y="360" class="body">Operator-driven motion collection</text>
  <text x="480" y="408" class="small">Captured modalities</text>
  <rect x="480" y="430" width="128" height="34" rx="17" fill="#eef6fb"/>
  <text x="505" y="452" class="chip">Joint states</text>
  <rect x="620" y="430" width="146" height="34" rx="17" fill="#eef6fb"/>
  <text x="648" y="452" class="chip">Multi-view RGB</text>
  <rect x="480" y="478" width="170" height="34" rx="17" fill="#eef6fb"/>
  <text x="506" y="500" class="chip">Robot embodiment</text>
  <rect x="660" y="478" width="88" height="34" rx="17" fill="#eef6fb"/>
  <text x="682" y="500" class="chip">Future</text>
  <text x="480" y="556" class="body">Motor current planned for</text>
  <text x="480" y="582" class="body">high-load manipulation cases</text>

  <rect x="820" y="220" width="320" height="255" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <text x="850" y="268" class="section">Inspection and QA</text>
  <text x="850" y="324" class="body">Episodes reviewed for consistency,</text>
  <text x="850" y="350" class="body">interference, hand state, and</text>
  <text x="850" y="376" class="body">protocol compliance.</text>
  <rect x="850" y="410" width="210" height="40" rx="20" fill="#daf1df"/>
  <text x="901" y="436" class="label">Clean Success</text>
  <rect x="850" y="464" width="210" height="40" rx="20" fill="#f6eed0"/>
  <text x="903" y="490" class="label">Dirty Success</text>
  <rect x="850" y="518" width="210" height="40" rx="20" fill="#f6dada"/>
  <text x="922" y="544" class="label">Fail</text>
  <text x="850" y="598" class="body">Low-value samples filtered before</text>
  <text x="850" y="624" class="body">reaching downstream learning</text>

  <rect x="1180" y="220" width="330" height="255" rx="26" fill="#ffffff" filter="url(#shadow)"/>
  <text x="1210" y="268" class="section">Learning Support</text>
  <text x="1210" y="326" class="label">Imitation learning</text>
  <text x="1210" y="354" class="body">Behavior prior from curated demos</text>
  <text x="1210" y="410" class="label">Hybrid iteration</text>
  <text x="1210" y="438" class="body">QA labels reused for experiment</text>
  <text x="1210" y="464" class="body">analysis and refinement loops</text>
  <text x="1210" y="520" class="label">Deployment target</text>
  <text x="1210" y="548" class="body">Warehouse and logistics workflows</text>
  <text x="1210" y="574" class="body">for real customer environments</text>

  <path d="M410 348 L450 348" stroke="#6b8690" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M780 348 L820 348" stroke="#6b8690" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1140 348 L1180 348" stroke="#6b8690" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <rect x="120" y="550" width="1390" height="250" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="160" y="602" class="section">Operational Insight</text>
  <text x="160" y="646" class="body">The contribution of this project was not just collecting more trajectories, but building a learning-ready process:</text>
  <text x="160" y="686" class="label">repeatable teleoperation -> structured QA -> curated dataset -> more reliable policy experiments.</text>

  <rect x="160" y="718" width="210" height="42" rx="21" fill="#e6f2f8"/>
  <text x="207" y="745" class="chip">~10k collection attempts</text>
  <rect x="388" y="718" width="228" height="42" rx="21" fill="#e7f5eb"/>
  <text x="445" y="745" class="chip">~300 episodes per object</text>
  <rect x="634" y="718" width="230" height="42" rx="21" fill="#f7f0d9"/>
  <text x="703" y="745" class="chip">3-tier QA taxonomy</text>
  <rect x="882" y="718" width="276" height="42" rx="21" fill="#e9eef8"/>
  <text x="955" y="745" class="chip">Upper-body manipulation PoCs</text>
  <rect x="1176" y="718" width="294" height="42" rx="21" fill="#edf2f3"/>
  <text x="1251" y="745" class="chip">Logistics-oriented deployment target</text>
</svg>
